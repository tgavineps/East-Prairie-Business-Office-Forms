<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Prairie School District 73 - Business Office Hub</title>
    <!-- External Dependencies matching our form styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8 flex flex-col items-center">

   <!-- Main Container Frame: Reduced internal padding to collapse the white space -->
<div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl px-6 md:px-10 pt-4 pb-6 border-t-8 border-[#002855]">
    
<!-- Cleaned Header Section: Negative Margin Override to Defeat Invisible Image Borders -->
<header class="text-center -mt-6 -mb-12">
    <div class="mx-auto flex items-center justify-center px-4">
        <!-- Kept the perfect width, but negative margins clamp the vertical gaps -->
        <img src="./logo.png" 
             alt="East Prairie School District 73 Business Office" 
             class="w-64 max-w-full h-auto object-contain md:w-80">
    </div>
</header>

    <!-- The rest of your code (<div class="grid grid-cols-1 md:grid-cols-2 gap-8">) remains exactly the same -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- SECTION 1: STAFF REQUESTS & FORMS -->
            <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <!-- Clean contrast status marker -->
                        <div class="h-3 w-3 rounded-full bg-gray-400"></div>
                        <h2 class="text-lg font-bold text-gray-900">Staff Requests & Forms</h2>
                    </div>
                    <p class="text-sm text-gray-600 mb-6">East Prairie Staff Forms</p>
                </div>
                
                <div class="space-y-3">
                    <!-- Button: Clean high-contrast style flipping to EPSD73 Navy on hover -->
                    <a href="./employee-reimbursement-form/" class="block w-full text-center bg-gray-800 hover:bg-[#002855] text-white font-bold py-3 px-4 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                        Employee Reimbursement Form
                    </a>
                    
                    <button disabled class="block w-full text-center bg-gray-100 text-gray-400 font-medium py-3 px-4 rounded-xl cursor-not-allowed text-sm border border-dashed border-gray-200">
                        + Add Staff Form (Placeholder)
                    </button>
                </div>
            </section>

            <!-- SECTION 2: BUSINESS OFFICE ADMIN -->
            <section class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <!-- EPSD73 Blue Status Marker -->
                        <div class="h-3 w-3 rounded-full bg-[#002855]"></div>
                        <h2 class="text-lg font-bold text-gray-900">Business Office Admin</h2>
                    </div>
                    <p class="text-sm text-gray-600 mb-6">For East Prairie Business Office Use Only</p>
                </div>
                
                <div class="space-y-3">
                    <!-- Button: Locked in deep hex code #002855 matching the actual website header bar -->
                    <a href="./employment-offer-form/" class="block w-full text-center bg-[#002855] hover:bg-gray-800 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                        Terms of Employment
                    </a>
                    
                    <button disabled class="block w-full text-center bg-gray-100 text-gray-400 font-medium py-3 px-4 rounded-xl cursor-not-allowed text-sm border border-dashed border-gray-200">
                        + Add Admin Form (Placeholder)
                    </button>
                </div>
            </section>

        </div>

        <!-- Footer Notice -->
        <footer class="mt-12 pt-6 border-t text-center text-xs text-gray-400 font-medium">
            For questions, please contact business@eps73.net.
        </footer>
    </div>

</body>
</html>
