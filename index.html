<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Office Forms Hub</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        p {
            color: #64748b;
            margin-bottom: 30px;
        }
        .form-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-btn {
            display: block;
            background-color: #0284c7;
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.2s, transform 0.1s;
        }
        .form-btn:hover {
            background-color: #0369a1;
            transform: translateY(-1px);
        }
        .form-btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>East Prairie Business Office</h1>
        <p>Select a fillable form from the list below to get started.</p>
        
        <div class="form-list">
            <a class="form-btn" href="#">
                Employee Reimbursement Form
            </a>
            
            </div>
    </div>

</body>
</html>
