<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Prairie School District 73 - Business Office Hub</title>
    <!-- External Dependencies matching our form styles -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8 flex flex-col items-center">

    <!-- Main Container Accent: Deep Slate Blue/Navy Top Border -->
    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-10 border-t-8 border-slate-900">
        
        <!-- Header Section -->
        <header class="text-center mb-10 border-b pb-6">
            <div class="mx-auto h-20 w-20 mb-4 overflow-hidden shadow-md border rounded-xl bg-white flex items-center justify-center border-slate-200">
                <!-- Branding icon matching the new navy accent color -->
                <span class="text-2xl font-bold text-slate-900">EP</span>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 mb-2">East Prairie Business Office Dashboard</h1>
            <!-- Subtitle dropped down to a crisp District Grey -->
            <p class="text-slate-500 font-bold uppercase tracking-wider text-sm">District 73</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- SECTION 1: STAFF REQUESTS & FORMS -->
            <section class="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <!-- Grey Status Dot -->
                        <div class="h-3 w-3 rounded-full bg-slate-400"></div>
                        <h2 class="text-lg font-bold text-gray-800">Staff Requests & Forms</h2>
                    </div>
                    <p class="text-sm text-gray-600 mb-6">East Prairie Staff Forms</p>
                </div>
                
                <div class="space-y-3">
                    <!-- Button: Balanced Grey accent with Navy Hover -->
                    <a href="./employee-reimbursement-form/" class="block w-full text-center bg-slate-600 hover:bg-slate-900 text-white font-semibold py-3 px-4 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                        Employee Reimbursement Form
                    </a>
                    
                    <button disabled class="block w-full text-center bg-gray-200 text-gray-400 font-medium py-3 px-4 rounded-xl cursor-not-allowed text-sm border border-dashed border-gray-300">
                        + Add Staff Form (Placeholder)
                    </button>
                </div>
            </section>

            <!-- SECTION 2: BUSINESS OFFICE ADMIN -->
            <section class="bg-slate-50 p-6 rounded-2xl border border-slate-200 flex flex-col justify-between">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <!-- Navy Status Dot -->
                        <div class="h-3 w-3 rounded-full bg-slate-900"></div>
                        <h2 class="text-lg font-bold text-gray-800">Business Office Admin</h2>
                    </div>
                    <p class="text-sm text-gray-600 mb-6">For East Prairie Business Office Use Only</p>
                </div>
                
                <div class="space-y-3">
                    <!-- Button: Solid Deep Navy with Grey Hover -->
                    <a href="./employment-offer-form/" class="block w-full text-center bg-slate-900 hover:bg-slate-700 text-white font-semibold py-3 px-4 rounded-xl shadow-sm transition-all transform hover:-translate-y-0.5 active:translate-y-0">
                        Terms of Employment
                    </a>
                    
                    <button disabled class="block w-full text-center bg-gray-200 text-gray-400 font-medium py-3 px-4 rounded-xl cursor-not-allowed text-sm border border-dashed border-gray-300">
                        + Add Admin Form (Placeholder)
                    </button>
                </div>
            </section>

        </div>

        <!-- Footer Notice -->
        <footer class="mt-12 pt-6 border-t text-center text-xs text-gray-400">
            For questions, please contact business@eps73.net.
        </footer>
    </div>

</body>
</html>
