<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">East Prairie School District 73 - Extra Duty Timesheet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .input-row-focus:focus-within {
            background-color: #f0f7ff;
        }
        @media print {
            body {
                background-color: #fff !important;
                padding: 0 !important;
                /* Establish a reliable viewport scaling width for browsers running at 100% default scale */
                width: 100% !important;
                zoom: 95%;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .no-print {
                display: none !important;
            }
            .print-container {
                max-width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
            }
            .print-table {
                font-size: 0.75rem !important;
                width: 100% !important;
                border-collapse: collapse !important;
            }
            .print-table th, .print-table td {
                padding: 0.4rem !important;
                border: 1px solid #d1d5db !important;
            }
            input[type="text"], input[type="number"], select, input[type="time"], input[type="date"] {
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
                appearance: none !important;
                -webkit-appearance: none !important;
                pointer-events: none !important;
                width: 100% !important;
            }
            .unlogged-day-row {
                display: none !important;
            }
            header {
                margin-top: 12px !important;
                margin-bottom: 24px !important;
            }
            section {
                page-break-inside: avoid;
            }
            table { 
                page-break-inside: auto; 
            }
            tr { 
                page-break-inside: avoid; 
                page-break-after: auto; 
            }
        }
    </style>
</head>
<body class="p-4 md:p-6">

    <div id="form-container" class="print-container max-w-6xl mx-auto bg-white rounded-2xl shadow-xl px-4 md:px-8 pt-6 pb-8 border-t-8 border-[#002855]">
        
        <header class="w-full flex items-center justify-center pt-5 pb-8">
            <img src="../logoh.png" 
                 alt="East Prairie School District 73" 
                 class="w-80 max-w-full h-auto object-contain p-0 m-0 block">
        </header>

        <section class="mb-6">
            <div class="border-b pb-2 mb-4 border-[#002855]/20">
                <h2 class="text-base font-bold text-gray-800">1. Extra Duty Timesheet — Employee & Pay Period Information</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="flex flex-col">
                    <label for="tsEmployeeName" class="text-gray-700 font-semibold mb-1 text-xs">Employee Name</label>
                    <input type="text" id="tsEmployeeName" class="border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-[#002855] focus:border-[#002855] transition-colors" placeholder="Full Name">
                </div>
                <div class="flex flex-col">
                    <label for="tsMonthSelect" class="text-gray-700 font-semibold mb-1 text-xs">Month</label>
                    <select id="tsMonthSelect" onchange="generateCalendarRows()" class="border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-[#002855] focus:border-[#002855] transition-colors">
                        <option value="0">January</option>
                        <option value="1">February</option>
                        <option value="2">March</option>
                        <option value="3">April</option>
                        <option value="4">May</option>
                        <option value="5" selected>June</option>
                        <option value="6">July</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">October</option>
                        <option value="10">November</option>
                        <option value="11">December</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label for="tsYearSelect" class="text-gray-700 font-semibold mb-1 text-xs">Year</label>
                    <input type="text" id="tsYearSelect" value="2026" oninput="generateCalendarRows()" class="border border-gray-300 rounded-lg p-2 text-sm text-center focus:ring-2 focus:ring-[#002855]">
                </div>
            </div>
        </section>

        <section class="mb-6">
            <div class="border-b pb-2 mb-3 border-[#002855]/20 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                <div>
                    <h2 class="text-base font-bold text-gray-800">2. Daily Activity Log</h2>
                    <p class="text-xs text-slate-500 mt-0.5 no-print">Tip: Leave unused days completely blank—they will automatically hide when printing or saving as a PDF.</p>
                </div>
                <div class="flex items-center gap-4 no-print select-none">
                    <label class="inline-flex items-center cursor-pointer bg-slate-100 px-3 py-1.5 rounded-lg border border-gray-200">
                        <input type="checkbox" id="toggleWeekends" onchange="generateCalendarRows()" class="sr-only peer">
                        <div class="relative w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-[#002855]"></div>
                        <span class="ms-2 text-xs font-semibold text-gray-700">Show Weekends</span>
                    </label>
                    <button type="button" onclick="clearAllRows()" class="border border-red-200 text-red-500 hover:bg-red-50 text-xs py-1.5 px-3 rounded-lg transition-all font-medium">
                        Clear Grid
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm bg-slate-50/50">
                <table class="print-table w-full text-left text-xs
